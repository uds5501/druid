---
# Source: druid-operator/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    helm.sh/chart: druid-operator-0.3.9
    app.kubernetes.io/name: druid-operator
    app.kubernetes.io/instance: druid-operator-test
    app.kubernetes.io/version: "v1.3.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: manager
    app.kubernetes.io/created-by: druid-operator
    app.kubernetes.io/part-of: druid-operator
    control-plane: controller-manager
  name: druid-operator-test
  namespace: druid-operator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: druid-operator
      app.kubernetes.io/instance: druid-operator-test
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: druid-operator
        app.kubernetes.io/instance: druid-operator-test
        control-plane: controller-manager
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/arch
                operator: In
                values:
                - amd64
                - arm64
                - ppc64le
                - s390x
              - key: kubernetes.io/os
                operator: In
                values:
                - linux
      containers:
        - args:
            - --secure-listen-address=0.0.0.0:8443
            - --upstream=http://127.0.0.1:8080/
            - --logtostderr=true
            - --v=0
          image: "gcr.io/kubebuilder/kube-rbac-proxy:v0.13.1"
          imagePullPolicy: IfNotPresent
          name: kube-rbac-proxy
          ports:
            - containerPort: 8443
              name: https
              protocol: TCP
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 5m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=127.0.0.1:8080
            - --leader-elect
          env:
            - name: DENY_LIST
              value: "default,kube-system"
            - name: RECONCILE_WAIT
              value: "10s"
            - name: WATCH_NAMESPACE
              value: "druid"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          command:
            - /manager
          image: "datainfrahq/druid-operator:v1.3.0"
          imagePullPolicy: IfNotPresent
          livenessProbe:
            
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          readinessProbe:
            
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
      serviceAccountName: druid-operator-test
      terminationGracePeriodSeconds: 10
